<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeWonder — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --green:#00ff88; --teal:#00ccaa; --dark:#020e06; --border:rgba(0,255,136,.2); }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      background:var(--dark); color:#fff;
      font-family:'Noto Sans JP',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    body::before{
      content:''; position:fixed; inset:0;
      background:radial-gradient(ellipse at 50% 40%,rgba(0,180,80,.11) 0%,transparent 60%),
                 radial-gradient(ellipse at 90% 10%,rgba(0,220,160,.08) 0%,transparent 45%),
                 radial-gradient(ellipse at 10% 90%,rgba(0,255,100,.07) 0%,transparent 45%);
      pointer-events:none;
      animation:bgRise 7s ease-in-out infinite alternate;
    }
    @keyframes bgRise{ to{ filter:brightness(1.08); } }
    .box{
      width:100%; max-width:420px;
      background:rgba(2,18,8,.78);
      border:1px solid var(--border); border-radius:16px; padding:40px;
      backdrop-filter:blur(24px); box-shadow:0 0 80px rgba(0,200,100,.12);
      position:relative; z-index:1;
    }
    .logo{ font-family:'Orbitron',sans-serif; font-size:1.5rem; font-weight:900;
      background:linear-gradient(135deg,#fff 0%,var(--green) 55%,var(--teal) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; text-align:center; margin-bottom:6px;
      animation:logoArise 3s ease-in-out infinite alternate;
    }
    @keyframes logoArise{ from{filter:drop-shadow(0 0 6px rgba(0,255,130,.45))} to{filter:drop-shadow(0 0 22px rgba(0,255,130,.85)) drop-shadow(0 0 50px rgba(0,200,160,.35))} }
    .logo-sub{ font-size:.7rem; color:rgba(0,255,136,.4); text-align:center; letter-spacing:.5em; margin-bottom:8px; }
    .plan-badge{
      background:rgba(0,255,136,.06); border:1px solid rgba(0,255,136,.18);
      border-radius:6px; padding:10px 14px; text-align:center;
      font-size:.8rem; color:rgba(255,255,255,.55); margin-bottom:26px; line-height:1.5;
    }
    .plan-badge strong{ color:var(--green); }
    label{ display:block; font-size:.75rem; color:rgba(0,255,136,.8); letter-spacing:.15em; text-transform:uppercase; margin-bottom:6px; }
    input{
      width:100%; background:rgba(0,0,0,.55); border:1px solid rgba(0,255,136,.15);
      border-radius:8px; color:#fff; font-family:'Noto Sans JP',sans-serif;
      font-size:.95rem; padding:12px 14px; outline:none;
      transition:border-color .3s,box-shadow .3s; margin-bottom:20px;
    }
    input:focus{ border-color:var(--green); box-shadow:0 0 16px rgba(0,255,136,.2); }
    .btn{
      width:100%; padding:14px;
      background:linear-gradient(90deg,#004422,var(--teal),var(--green));
      background-size:200%; animation:btnArise 4s linear infinite;
      border:none; border-radius:8px; color:#001a0a;
      font-family:'Orbitron',sans-serif; font-size:.85rem;
      font-weight:900; letter-spacing:.18em; cursor:pointer;
      transition:transform .2s,box-shadow .2s;
    }
    @keyframes btnArise{ 0%,100%{background-position:0%} 50%{background-position:100%} }
    .btn:hover{ transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,255,136,.35); }
    .alt{ text-align:center; margin-top:18px; font-size:.82rem; color:rgba(255,255,255,.4); }
    .alt a{ color:var(--green); text-decoration:none; }
    .alt a:hover{ text-decoration:underline; color:var(--teal); }
    .flash{
      background:rgba(255,80,80,.1); border:1px solid rgba(255,80,80,.3);
      border-radius:8px; padding:10px 14px; color:#ff6666; font-size:.82rem; margin-bottom:18px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">ANIMEWONDER</div>
    <div class="logo-sub">アニメ創造エンジン</div>

    <div class="plan-badge">
      Create an account, then unlock full access with a <strong>subscription</strong>.<br>
      Free trial scenes available after sign-up.
    </div>

    {% with msgs = get_flashed_messages() %}
      {% if msgs %}
        <div class="flash">{{ msgs[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <label>Email</label>
      <input type="email" name="email" autocomplete="email" required>
      <label>Password (min 6 chars)</label>
      <input type="password" name="password" autocomplete="new-password" required>
      <button class="btn" type="submit">CREATE ACCOUNT</button>
    </form>

    <div class="alt">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</body>
</html>
