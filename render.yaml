# Render.com one-click deploy config. To use:
#   1. Push this folder to a GitHub repo
#   2. On Render: New + → Blueprint → connect the repo → Render reads this file
#
# Free tier: $0/mo. Sleeps after 15 min idle, first request after sleep takes
# ~30 sec cold start. 750 hours/mo of uptime (enough for one app 24/7).
#
# About users.db on free tier: SQLite lives on the container's local filesystem.
# It survives sleep/wake cycles but IS WIPED on every redeploy (every git push,
# every env-var change). Acceptable for launch/validation. To make users.db
# persistent across deploys, upgrade to the $7/mo Starter plan and add a
# `disk:` block (Render rejects disks on free tier — that's why this file
# doesn't have one).

services:
  - type: web
    name: animewonder
    runtime: python
    plan: free
    region: oregon  # closest free region; change if you have latency-sensitive users elsewhere
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 600 --graceful-timeout 30 --preload --bind 0.0.0.0:$PORT
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PAYPAL_MODE
        value: sandbox
      - key: FLASK_ENV
        value: production
      # Set these in the Render dashboard (Environment tab) — do NOT commit values:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_PLAN_HUNTER
        sync: false
      - key: PAYPAL_PLAN_MONARCH
        sync: false
